name: "aml2026-group-15"
channels:
  - conda-forge
  - pytorch
  - nvidia
  - nodefaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - pytorch-cuda=11.8
  - conda-forge::tmux
  - conda-forge::ncurses>=6.4
  - scikit-learn
  - pandas
  - seaborn
  - matplotlib
  - jupyterlab
  - tqdm
  - pip:
      - transformers[torch] # Required for SciBERT
      - rank_bm25            # Required for BM25 Baseline
      - accelerate          # Required for training schedule
      - datasets
